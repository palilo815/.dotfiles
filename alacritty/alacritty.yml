window:
  padding:
    x: 0
    y: 0

  opacity: 1.0

font:
  normal:
    family: DejaVuSansMono Nerd Font Mono

  size: 8

  offset:
    x: 0
    y: 0

# https://github.com/rajasegar/alacritty-themes/blob/master/themes/vscode.dark.yml
colors:
  name:         vscode (dark)
  author:       senpai-10

  primary:
    background: "#1E1E1E"
    foreground: "#D4D4D4"

  cursor:
    text:       "#1d1f21"
    cursor:     "#cccccc"

  normal:
    black:      "#000000"
    red:        "#cd3131"
    green:      "#0dbc79"
    yellow:     "#e5e510"
    blue:       "#2472c8"
    magenta:    "#bc3fbc"
    cyan:       "#11a8cd"
    white:      "#e5e5e5"

  bright:
    black:      "#666666"
    red:        "#f14c4c"
    green:      "#23d18b"
    yellow:     "#f5f543"
    blue:       "#3b8eea"
    magenta:    "#d670d6"
    cyan:       "#29b8db"
    white:      "#e5e5e5"


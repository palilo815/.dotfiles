window:
  padding:
    x: 0
    y: 0

  opacity: 1.0

font:
  normal:
    family: DejaVuSansMono Nerd Font Mono

  size: 8

  offset:
    x: 0
    y: 0

# Colors (Dark plus)
colors:
  primary:
    background: '0x1E1E1E'
    foreground: '0xD4D4D4'

  normal:
    black:   '0x1E1E1E'
    red:     '0xF44747'
    green:   '0x608B4E'
    yellow:  '0xD7BA7D'
    blue:    '0x569CD6'
    magenta: '0xC586C0'
    cyan:    '0x9CDCFE'
    white:   '0xD4D4D4'

